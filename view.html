<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,user-scalable=0">
  <title>HEX DEX</title>
</head>
<body>
  <h1>HEX DEX</h1>

  <main class="container">
    <form id="input">
      <textarea id="inputdata"></textarea>
      <button type="submit">Load ⌘+⏎</button>
    </form>

    <section class="struct">
      <h4>Structure</h4>
      <ul id="struct"></ul>
    </section>

    <section class="info">
      <h4>Info</h4>
      <div id="info"></div>
    </section>

    <section class="chardump">
      <h4>Text</h4>
      <div id="chardump"></div>
    </section>

    <section class="hexdump">
      <h4>Hex</h4>
      <div id="hexdump"></div>
    </section>
  <main>

<script>
  function createElement(tag, attributes = {}, children = []) {
    const el = document.createElement(tag);
    Object.entries(attributes).forEach(([k, v]) => el.setAttribute(k, v));
    if (typeof children === "string") children = [children];
    for (let c of children) {
      if (c !== null && c !== undefined) {
        el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
      }
    }
    return el;
  }

  const $ = (id) => document.querySelector(id);
  $.div = createElement.bind(null, "div");
  $.span = createElement.bind(null, "span");
  $.ul = createElement.bind(null, "ul");
  $.li = createElement.bind(null, "li");

  const $hex = $("#hexdump");
  const $txt = $("#chardump");
  const $struct = $("#struct");
  const $info = $("#info");

  let nextId = 0;
  const store = [];

  function validate({ TYPE, POS, SIZE, data_hex }) {
    const errors = [];

    if (TYPE === "DATA") {
      const expected_hex = window.raw_object.data_hex?.substring(POS * 2).slice(0, SIZE * 2);
      if (expected_hex && data_hex !== expected_hex) {
        errors.push(`Hex value does not match, expected ${expected_hex}.`);
      }
      if (data_hex.length !== SIZE * 2) {
        parsed.errors.push(`Invalid size, expected hex value to be ${SIZE}B`);
      }
    }

    return errors;
  }

  function parseStruct(raw, name) {
    const { TYPE, POS, SIZE, ...obj } = raw;
    const parsed = {
      TYPE, POS, SIZE,
      ID: nextId++,
      errors: validate(raw),
    };

    switch (TYPE) {
      case "DATA": {
        const { data_hex, ...data } = obj;

        Object.assign(parsed, {
          data,
          hex: data_hex,
          name: name || "data",
        });
        break;
      }
      case "LIST": {
        const { ITEMS, ...data } = obj;
        const items = ITEMS.map(((item, i) => parseStruct(item, `item#${i}`)));
        Object.assign(parsed, {
          data: { ...data, items },
          hex: items.map(f => f.hex).join(""),
          name: name || "list"
        });
        break;
      }
      case "OBJECT": {
        const { FIELDS, ...data } = obj;
        const fields = FIELDS.map(([name, data]) => parseStruct(data, name));
        Object.assign(parsed, {
          data: { ...data, fields },
          hex: fields.map(f => f.hex).join(""),
          name: name || "object"
        });
        break;
      }
      default: {
        throw new Error(`Unknown type ${TYPE}`);
      }
    }

    store[parsed.ID] = parsed;
    return store[parsed.ID];
  }

  function hexToText(hex) {
    return hex
      .match(/.{2}/g)
      .map((c) => {
        const i = parseInt(c, 16);
        return (i>32 && i<128) ? String.fromCharCode(i) : ".";
      })
      .join("");
  }

  function generateTree({ ID, TYPE, POS, SIZE, errors, data, name }) {
    const attributes = { "data-id": ID };
    const labelAttributes = {};
    if (errors.length > 0) {
      labelAttributes.class = "invalid";
      labelAttributes.errors = errors.join(" | ");
    }

    switch (TYPE) {
      case "DATA": {
        return $.li(attributes, [$.span(labelAttributes, name)]);
      }
      case "LIST": {
        return $.li(attributes, [$.span(labelAttributes, `${name} []`), $.ul({}, data.items.map(generateTree))]);
      }
      case "OBJECT": {
        return $.li(attributes, [$.span(labelAttributes, `${name} {}`), $.ul({}, data.fields.map(generateTree))]);
      }
      default: {
        throw new Error(`Unknown type ${TYPE}`);
      }
    }
  }

  function loadStuff(e) {
    e?.preventDefault();
    const raw = JSON.parse(inputdata.value);
    window.raw_object = raw;
    inputdata.value = JSON.stringify(raw, null, 2);
    inputdata.blur();

    const struct = parseStruct(raw.struct);
    if (raw.data_hex && struct.hex !== raw.data_hex) {
      struct.errors.push("Hex data does not match the input.");
    }
    $hex.innerText = struct.hex;
    $txt.innerText = hexToText(struct.hex);
    $struct.innerText = "";
    $struct.appendChild(generateTree(struct));
  }

  $("#input").addEventListener("submit", loadStuff);
  $("#inputdata").addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.keyCode === 13) {
      loadStuff(e);
    }
  })

  function range(el, offset, size = 0) {
    const r = new Range();
    r.setStart(el, offset);
    r.setEnd(el, offset + size);
    return r;
  }

  function highlight(offset, size) {
    const ranges = [
      range($hex.firstChild, offset * 2, size * 2),
      range($txt.firstChild, offset, size)
    ];
    CSS.highlights.set("selection", new Highlight(...ranges));
  }

  $struct.addEventListener("mouseout", () => highlight(0, 0));
  $struct.addEventListener("mouseover", ({ target }) => {
    const ID = parseInt(target?.closest("li").dataset.id, 10);
    const meta = store[ID];
    if (meta) {
      highlight(meta.POS, meta.SIZE);
      const children = [
        $.li({}, `offset: ${meta.POS}`),
        $.li({}, `size: ${meta.SIZE}`),
      ];

      if (meta.data?.format) {
        children.push(
          $.li({}, `format: ${meta.data.format}`),
          $.li({},`data: ${JSON.stringify(meta.data.data_fmt)}`)
        );
      }

      const $el = $.ul({}, children);
      $info.innerText = "";
      $info.appendChild($el);
    }
  });

  inputdata.value = `{
    "data_hex": "1122334422222222fefe1234123456788899f1f2f3",
    "struct": {"TYPE": "OBJECT", "POS": 0, "SIZE": 21, "FIELDS": [["field1", {"TYPE": "DATA", "POS": 0, "SIZE": 4, "data_hex": "11223344"}], ["field01", {"TYPE": "DATA", "POS": 4, "SIZE": 2, "data_hex": "2222"}], ["field02", {"TYPE": "DATA", "POS": 6, "SIZE": 2, "data_hex": "2222"}], ["field2", {"TYPE": "DATA", "POS": 8, "SIZE": 2, "format": ">H", "data_fmt": 65278, "data_hex": "fefe"}], ["obj1", {"TYPE": "OBJECT", "POS": 10, "SIZE": 11, "CLASS": "FooClass", "FIELDS": [["ob1_field1", {"TYPE": "DATA", "POS": 10, "SIZE": 2, "format": ">H", "data_fmt": 4660, "data_hex": "1234"}], ["many_fields", {"TYPE": "DATA", "POS": 12, "SIZE": 6, "format": "IBB", "data_fmt": [2018915346, 136, 153], "data_hex": "123456788899"}], ["array1", {"TYPE": "LIST", "POS": 18, "SIZE": 3, "ITEMS": [{"TYPE": "DATA", "POS": 18, "SIZE": 1, "data_hex": "f1"}, {"TYPE": "DATA", "POS": 19, "SIZE": 1, "data_hex": "f2"}, {"TYPE": "DATA", "POS": 20, "SIZE": 1, "data_hex": "f3"}]}]]}]]}
  }`;
</script>

<style>
  *, *:before, *:after {
    box-sizing: border-box;
    margin: 0;
    border-radius: .2rem;
  }

  body {
    background-color: #C0C0C0;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    text-align: justify;
    height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;

    --highlight-color: #ED0;
    --color-invalid: brown;
  }

  ul { list-style: none; padding: 0; position: relative; }

  .container {
    display: grid;
    height: 100%;
    width: 100%;
    gap: 8px;
    padding: 8px;
    grid-template:
      "q q q" 50px
      "s i i" 125px
      "s c h" 1fr
  }

  @media (orientation: portrait) {
    .container {
      grid-template:
        "q" 50px
        "s" 1fr 
        "c" auto
        "h" auto
        "i" auto 
    }
  }

  .container > section {
    padding: 16px;
    border: solid 1px #0003;
  }

  form#input {
    position: relative;
    height: 50px;
    z-index: 1;
    transition: height 0.1s 0.2s;
    grid-area: q;

    button {
      position: absolute;
      inset: auto 10px 10px auto;
      font-weight: bold;
      background: #C0C0C08;
      backdrop-filter: blur(1px);
      padding: .5em 1em;
      border: none;
      box-shadow: 0 1px 2px #000A;
      cursor: pointer;
    }
  }

  form#input:has(textarea:focus) {
    height: 50vh;
  }

  #inputdata {
    width: 100%;
    height: 100%;
    resize: none;
  }

  .struct {
    grid-area: s;
    overflow: auto;
  }
  .chardump { grid-area: c; }
  .hexdump { grid-area: h; }
  .info { grid-area: i; }
  
  #chardump { width: 16ch; }
  #hexdump { width: 32ch; }
  #struct, #hexdump, #chardump, #info { font-family: monospace; }

  #chardump, #hexdump {
    overflow-wrap: anywhere;
    line-break: anywhere;
    white-space: break-spaces;
  }

  #struct li {
    padding: 0.5ch 0 0.5ch 0.5ch;
    position: relative;
  }

  .invalid {
    position:relative;
    display: block;
  }

  .invalid::before {
    content: "❗";
  }

  .invalid:hover::after {
    content: attr(errors);
    position: absolute;
    top: 100%;
    left: 0;
    background: var(--color-invalid);
    padding: .2ch 1ch;
    z-index: 1;
    color: #fff;
    line-height: 1.5;
    pointer-events: none;
  }

  #struct > li li {
    margin-left: 2ch;
  }

  #struct li:hover {
    background-color: var(--highlight-color);
  }

  #struct li:hover:has(li:hover) {
    background-color: unset;
  }

  ::highlight(selection) {
    background-color: var(--highlight-color);
  }
</style>
</body>
</html>
